<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Dayunshorui</title>
    
    <script>
        fetch('/Dayunshorui/templates/head.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>
    <header role="banner">
        <div id="">header</div>
    </header>

    <main role="main">
        <h1>Dayunshorui</h1>
        <p>📝 Xin chào? </p>
    </main>

    <footer role="contentinfo">
        <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>
    </footer>

    <script src="templates/load.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTemplate('header', 'main.html');
        });
    </script>
</body>
</html>
