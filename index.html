<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Dayunshorui</title>
    
    <script>
        fetch('/Dayunshorui/templates/head.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main role="main">
        <h1>Dayunshorui</h1>
        <p>📝 Xin chào? </p>
    </main>

    <footer role="contentinfo">
        <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>
    </footer>

    <script>
    fetch('templates/main.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('header-placeholder').innerHTML = html;
        });
</script>
</body>
</html>
